<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4985fe">
  <meta name="description" content="Jacksonian — music, tennis, writing, and links from Jackson Cook">
  <link rel="icon" href="images/favicon.ico">
  <link rel="apple-touch-icon" href="images/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <title>Jacksonian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <nav class="topnav" aria-label="Section">
    <a href="#links">Links</a>
    <a href="#songs">Songs</a>
  </nav>

  <main id="main">
    <header class="hero">
      <img src="images/album_cover_chewflocka.jpg" class="hero-logo" alt="Jackson Cook">
      <p class="hero-kicker">Jacksonian</p>
    </header>

    <section id="links" class="links-band reveal" aria-label="Content links">
      <div class="section-heading">
        <p class="section-kicker">Explore</p>
        <h2>Content Links</h2>
      </div>
      <div id="link-groups" class="link-groups"></div>
    </section>

    <section id="songs" class="albums-band reveal" aria-label="Songs">
      <div class="section-heading">
        <p class="section-kicker">Listen</p>
        <h2>Songs</h2>
      </div>
      <div id="albums" class="albums"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Jackson Cook &middot; made with a little chaos</p>
  </footer>

  <dialog id="lyrics-modal" class="lyrics-modal">
    <button type="button" id="modal-close" class="modal-close" aria-label="Close">&times;</button>
    <h3 id="modal-title" class="modal-title"></h3>
    <p id="modal-lyrics" class="modal-lyrics"></p>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
