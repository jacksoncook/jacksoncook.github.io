<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4985fe">
  <meta name="description" content="Jacksonian — music, tennis, writing, and links from Jackson Cook">
  <link rel="icon" href="images/favicon.ico">
  <link rel="apple-touch-icon" href="images/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <title>Jacksonian</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <nav class="topnav" aria-label="Section">
    <a href="#links">Links</a>
    <a href="#songs">Songs</a>
  </nav>

  <main id="main">
    <header class="hero">
      <img src="images/album_cover_chewflocka.jpg" class="hero-logo" alt="Jackson Cook">
      <p class="hero-statement">
        Ahoy!<br>
        From this port you can quickly browse many things Jacksonian enjoys&hellip;
      </p>
    </header>

    <h2 id="links" class="section-divider">Content Links</h2>
    <section class="links-band" aria-label="Content links">
      <div id="link-groups" class="link-groups"></div>
    </section>

    <h2 id="songs" class="section-divider">Songs</h2>
    <section class="albums-band" aria-label="Songs">
      <div id="albums" class="albums"></div>
    </section>
  </main>

  <dialog id="lyrics-modal" class="lyrics-modal">
    <button type="button" id="modal-close" class="modal-close" aria-label="Close">&times;</button>
    <h3 id="modal-title" class="modal-title"></h3>
    <p id="modal-lyrics" class="modal-lyrics"></p>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
